<!DOCTYPE html><html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel Mayan Trip</title><style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

#fecha{
font-size:18px;
margin-bottom:5px;
}

#usd{
margin-bottom:25px;
}

.panel{
background:#1e293b;
padding:25px;
border-radius:18px;
margin:25px auto;
max-width:420px;
}

button{
width:100%;
padding:20px;
margin:14px 0;
font-size:20px;
border:none;
border-radius:14px;
background:#4f7df3;
color:white;
}

.progresoBar{
width:100%;
height:14px;
background:#334155;
border-radius:10px;
margin-top:12px;
overflow:hidden;
}

.progreso{
height:100%;
width:0%;
background:#4f7df3;
}

</style></head><body><h1>Panel Mayan Trip</h1><div id="fecha"></div>
<div id="usd"></div><div class="panel"><h2>Servicios de hoy</h2><div id="serviciosHoy">0</div>
<div id="paxHoy">Pax: 0</div>
<div id="balanceHoy">Balance: $0</div></div><button onclick="location.href='agenda.html'">
Agenda
</button><button onclick="location.href='servicios.html'">
Servicios
</button><button onclick="location.href='contabilidad.html'">
Contabilidad
</button><script>

let hoy=new Date()

let fecha=
hoy.toLocaleDateString("es-MX",{
weekday:"long",
year:"numeric",
month:"long",
day:"numeric"
})

document.getElementById("fecha").innerHTML=fecha

fetch("https://api.exchangerate.host/latest?base=USD&symbols=MXN")
.then(r=>r.json())
.then(d=>{

let tc = d.rates.MXN

localStorage.setItem("tipoCambio", tc)

document.getElementById("usd").innerHTML =
"USD → MXN: $" + tc.toFixed(2)

})

let servicios=0
let pax=0
let balance=0

for(let key in localStorage){

if(key.startsWith("servicios-")){

let lista=JSON.parse(localStorage.getItem(key))

lista.forEach(s=>{

let hoyISO=new Date().toISOString().split("T")[0]

if(s.fecha==hoyISO){

servicios++

pax+=Number(s.pax)

balance+=Number(s.balance)

}

})

}

}

document.getElementById("serviciosHoy").innerHTML="Servicios: "+servicios
document.getElementById("paxHoy").innerHTML="Pax: "+pax
document.getElementById("balanceHoy").innerHTML="Balance: $"+balance

</script></body></html>
