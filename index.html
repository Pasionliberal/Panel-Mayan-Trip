<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel</title>

<style>
body{
font-family:sans-serif;
background:#0f172a;
color:white;
padding:20px;
text-align:center;
}

.panel{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:16px;
}

h2{
margin-bottom:5px;
}
</style>
</head>

<body>

<h2 id="fecha"></h2>

<div class="panel">
<h3>Servicios de hoy</h3>

<p id="numServicios">0 servicios</p>
<p id="balance">$0</p>

</div>

<button onclick="location.href='agenda.html'">📅 Calendario</button>
<button onclick="location.href='servicios.html'">🚐 Servicios</button>
<button onclick="location.href='contabilidad.html'">💰 Contabilidad</button>

<script>

// fecha
let hoy=new Date().toISOString().split("T")[0]

document.getElementById("fecha").innerText=hoy

// servicios del día
let lista=JSON.parse(localStorage.getItem("servicios-"+hoy) || "[]")

let total=0

lista.forEach(s=>{
if(s.balance){
total+=Number(s.balance)
}
})

document.getElementById("numServicios").innerText=lista.length+" servicios"
document.getElementById("balance").innerText="$"+total

</script>

</body>
</html>
