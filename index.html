<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Mayan Trip</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

button{
width:100%;
padding:16px;
margin:10px 0;
background:#3b82f6;
border:none;
border-radius:8px;
font-size:18px;
color:white;
}

</style>
</head>

<body>

<h2>Panel Mayan Trip</h2>

<div id="fecha"></div>
<div id="cambio"></div>

<br><br>

<button onclick="location.href='agenda.html'">Agenda</button>

<button onclick="location.href='servicios.html'">Servicios</button>

<button onclick="location.href='contabilidad-personal.html'">
Contabilidad Personal
</button>

<button onclick="location.href='contabilidad-trabajo.html'">
Contabilidad Trabajo
</button>

<script>

let hoy = new Date()

document.getElementById("fecha").innerHTML =
hoy.toLocaleDateString("es-MX",{
weekday:"long",
year:"numeric",
month:"long",
day:"numeric"
})

fetch("https://api.exchangerate-api.com/v4/latest/USD")
.then(r=>r.json())
.then(data=>{
document.getElementById("cambio").innerHTML =
"USD → MXN: $" + data.rates.MXN.toFixed(2)
})

</script>

</body>
</html>
