<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Mayan Trip</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

button{
width:100%;
padding:16px;
margin:10px 0;
background:#3b82f6;
border:none;
border-radius:8px;
font-size:18px;
color:white;
}

.progreso{
margin-top:20px;
padding:15px;
background:#1e293b;
border-radius:10px;
}

.barra{
height:20px;
background:#334155;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.barra-interna{
height:100%;
background:#22c55e;
width:0%;
}

</style>
</head>

<body>

<h2>Panel Mayan Trip</h2>

<div id="fecha"></div>
<div id="cambio"></div>

<div class="progreso">
<h3>Progreso del día</h3>
<div id="contador">0 / 0 tareas</div>

<div class="barra">
<div id="barra" class="barra-interna"></div>
</div>

</div>

<br>

<button onclick="location.href='agenda.html'">Agenda</button>

<button onclick="location.href='servicios.html'">Servicios</button>

<button onclick="location.href='contabilidad-personal.html'">
Contabilidad Personal
</button>

<button onclick="location.href='contabilidad-trabajo.html'">
Contabilidad Trabajo
</button>

<script>

/* fecha */

let hoy = new Date()

document.getElementById("fecha").innerHTML =
hoy.toLocaleDateString("es-MX",{
weekday:"long",
year:"numeric",
month:"long",
day:"numeric"
})

/* tipo de cambio */

fetch("https://api.exchangerate-api.com/v4/latest/USD")
.then(r=>r.json())
.then(data=>{
document.getElementById("cambio").innerHTML =
"USD → MXN: $" + data.rates.MXN.toFixed(2)
})

/* progreso */

function keyHoy(){
const hoy=new Date()
const y=hoy.getFullYear()
const m=String(hoy.getMonth()+1).padStart(2,'0')
const d=String(hoy.getDate()).padStart(2,'0')
return y+"-"+m+"-"+d
}

let hoyKey=keyHoy()

let tareas=JSON.parse(localStorage.getItem("tareas-"+hoyKey)||"[]")

let total=tareas.length
let hechas=0

tareas.forEach(t=>{
if(t.check) hechas++
})

document.getElementById("contador").innerHTML=
hechas+" / "+total+" tareas"

let progreso=0

if(total>0){
progreso=(hechas/total)*100
}

document.getElementById("barra").style.width=progreso+"%"

</script>

</body>
</html>
