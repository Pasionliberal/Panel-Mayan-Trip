<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agenda</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h2{
margin-bottom:10px;
}

table{
width:100%;
max-width:520px;
margin:auto;
border-collapse:collapse;
}

td{
padding:8px;
border-bottom:1px solid #334155;
}

input{
padding:8px;
border-radius:6px;
border:none;
}

textarea{
width:100%;
max-width:520px;
height:120px;
border-radius:8px;
padding:10px;
margin-top:10px;
}

button{
margin-top:16px;
padding:10px 18px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-size:16px;
}

a{
color:#a78bfa;
display:block;
margin-top:18px;
}

.tarea{
display:flex;
align-items:center;
gap:10px;
max-width:520px;
margin:10px auto;
padding:8px;
border-radius:8px;
}

.tarea input[type="checkbox"]{
width:20px;
height:20px;
}

.tarea input[type="text"]{
flex:1;
padding:10px;
border-radius:6px;
border:none;
}

.tarea.completa{
background:#166534;
}

.navegacion{
margin-bottom:15px;
}

</style>
</head>

<body>

<h2>Agenda</h2>

<div id="fecha"></div>

<div class="navegacion">
<button onclick="cambiarDia(-1)">◀ Ayer</button>
<button onclick="cambiarDia(0)">Hoy</button>
<button onclick="cambiarDia(1)">Mañana ▶</button>
</div>

<table id="agenda"></table>

<button id="guardarBtn">Guardar día</button>

<h3>Notas del día</h3>
<textarea id="notas" placeholder="Escribe notas del día..."></textarea>

<h3>Tareas del día</h3>
<div id="tareas"></div>

<button id="btnNuevaTarea">+ Nueva tarea</button>

<a href="agenda-mes.html">Vista mensual</a>
<a href="index.html">← Volver</a>

<script>

const agenda=document.getElementById("agenda")
const notas=document.getElementById("notas")
const tareas=document.getElementById("tareas")
const btnGuardar=document.getElementById("guardarBtn")
const btnNuevaTarea=document.getElementById("btnNuevaTarea")
const fechaTexto=document.getElementById("fecha")

let fechaActual=new Date()

function formatearFecha(fecha){

return fecha.toLocaleDateString("es-MX",{
weekday:"long",
year:"numeric",
month:"long",
day:"numeric"
})

}

function keyFecha(fecha){

const y=fecha.getFullYear()
const m=String(fecha.getMonth()+1).padStart(2,'0')
const d=String(fecha.getDate()).padStart(2,'0')

return y+"-"+m+"-"+d

}

function cambiarDia(valor){

fechaActual.setDate(fechaActual.getDate()+valor)
cargarTodo()

}

function crearAgenda(){

agenda.innerHTML=""

for(let h=6;h<=23;h++){

const h0=String(h).padStart(2,'0')

agenda.innerHTML+=`
<tr>
<td style="width:80px">${h0}:00</td>
<td><input style="width:100%" placeholder="evento..."></td>
</tr>
`

agenda.innerHTML+=`
<tr>
<td>${h0}:30</td>
<td><input style="width:100%" placeholder="evento..."></td>
</tr>
`

}

}

btnNuevaTarea.onclick=()=>{

const div=document.createElement("div")
div.className="tarea"

div.innerHTML=`
<input type="checkbox">
<input type="text" placeholder="Escribe tarea...">
`

const check=div.querySelector("input[type=checkbox]")

check.addEventListener("change",()=>{
if(check.checked){
div.classList.add("completa")
}else{
div.classList.remove("completa")
}
})

tareas.appendChild(div)

}

btnGuardar.onclick=()=>{

const key=keyFecha(fechaActual)

const eventos=[]
document.querySelectorAll("#agenda input").forEach(i=>{
eventos.push(i.value)
})

localStorage.setItem("agenda-"+key,JSON.stringify(eventos))
localStorage.setItem("notas-"+key,notas.value)

const lista=[]

document.querySelectorAll(".tarea").forEach(t=>{

const check=t.querySelector("input[type=checkbox]").checked
const texto=t.querySelector("input[type=text]").value

lista.push({check,texto})

})

localStorage.setItem("tareas-"+key,JSON.stringify(lista))

alert("Guardado")

}

function cargarTodo(){

crearAgenda()

fechaTexto.innerHTML=formatearFecha(fechaActual)

const key=keyFecha(fechaActual)

const eventos=JSON.parse(localStorage.getItem("agenda-"+key)||"[]")

document.querySelectorAll("#agenda input").forEach((i,idx)=>{
if(eventos[idx]) i.value=eventos[idx]
})

const n=localStorage.getItem("notas-"+key)
notas.value=n||""

tareas.innerHTML=""

const lista=JSON.parse(localStorage.getItem("tareas-"+key)||"[]")

lista.forEach(t=>{

const div=document.createElement("div")
div.className="tarea"

if(t.check){
div.classList.add("completa")
}

div.innerHTML=`
<input type="checkbox" ${t.check?"checked":""}>
<input type="text" value="${t.texto}">
`

const check=div.querySelector("input[type=checkbox]")

check.addEventListener("change",()=>{
if(check.checked){
div.classList.add("completa")
}else{
div.classList.remove("completa")
}
})

tareas.appendChild(div)

})

}

cargarTodo()

</script>

</body>
</html>
