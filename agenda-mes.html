<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calendario</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h2{
margin-bottom:10px;
}

.calendario{
max-width:520px;
margin:auto;
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.dia{
background:#1e293b;
padding:12px;
border-radius:6px;
cursor:pointer;
position:relative;
}

.dia:hover{
background:#334155;
}

.punto{
width:6px;
height:6px;
background:#22c55e;
border-radius:50%;
position:absolute;
bottom:5px;
left:50%;
transform:translateX(-50%);
}

.encabezado{
font-weight:bold;
}

.navegacion{
margin-bottom:15px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
margin:5px;
}

a{
display:block;
margin-top:20px;
color:#a78bfa;
}

</style>
</head>


<body>

<h2 id="mesTitulo"></h2>

<div class="navegacion">
<button onclick="cambiarMes(-1)">◀</button>
<button onclick="cambiarMes(1)">▶</button>
</div>

<div class="calendario" id="calendario"></div>

<a href="agenda.html">← Volver a agenda</a>
<button onclick="location.href='https://pasionliberal.github.io/Panel-Mayan-Trip/'">🏠 Inicio</button>

<script>

const calendario=document.getElementById("calendario")
const titulo=document.getElementById("mesTitulo")

let fecha=new Date()

const diasSemana=["Lu","Ma","Mi","Ju","Vi","Sa","Do"]

function keyFecha(año,mes,dia){
mes=String(mes+1).padStart(2,"0")
dia=String(dia).padStart(2,"0")
return `${año}-${mes}-${dia}`
}

function tieneActividad(key){

let agenda=JSON.parse(localStorage.getItem("agenda-"+key)||"[]")
let tareas=JSON.parse(localStorage.getItem("tareas-"+key)||"[]")
let notas=localStorage.getItem("notas-"+key)||""

let evento=agenda.some(e=>e && e.trim()!=="")
let tarea=tareas.some(t=>t.texto && t.texto.trim()!=="")
let nota=notas.trim()!==""

return evento || tarea || nota

}

function generarCalendario(){

calendario.innerHTML=""

let año=fecha.getFullYear()
let mes=fecha.getMonth()

let primerDia=new Date(año,mes,1).getDay()
if(primerDia===0) primerDia=7

let diasMes=new Date(año,mes+1,0).getDate()

titulo.innerHTML=fecha.toLocaleDateString("es-MX",{
month:"long",
year:"numeric"
})

diasSemana.forEach(d=>{
calendario.innerHTML+=`<div class="encabezado">${d}</div>`
})

for(let i=1;i<primerDia;i++){
calendario.innerHTML+=`<div></div>`
}

for(let d=1;d<=diasMes;d++){

let key=keyFecha(año,mes,d)

let diaElemento=document.createElement("div")
diaElemento.className="dia"
diaElemento.innerHTML=d

if(tieneActividad(key)){
let punto=document.createElement("div")
punto.className="punto"
diaElemento.appendChild(punto)
}

diaElemento.onclick=()=>{
window.location.href=`agenda.html?fecha=${key}`
}

calendario.appendChild(diaElemento)

}

}

function cambiarMes(valor){
fecha.setMonth(fecha.getMonth()+valor)
generarCalendario()
}

generarCalendario()

</script>

</body>
</html>
