<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios</title>

<style>
body{
font-family:sans-serif;
background:#0f172a;
color:white;
padding:20px;
text-align:center;
}

.panel{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
}

</style>
</head>

<body>

<button onclick="location.href='index.html'">🏠 Inicio</button>

<h2>Servicios</h2>

<div class="panel">

<input type="date" id="fecha">

<input type="time" id="hora" placeholder="Hora">

<input id="cliente" placeholder="Cliente">

<input id="origen" placeholder="Origen">

<input id="destino" placeholder="Destino">

<input id="pax" placeholder="Pax">

<input id="balance" placeholder="Balance">

<button onclick="guardar()">Guardar servicio</button>

</div>

<div class="panel">

<h3 id="totalServicios">Servicios: 0</h3>

<div id="lista"></div>

</div>

<script>

// fecha seleccionada
let fechaSeleccionada = localStorage.getItem("fechaSeleccionada") || new Date().toISOString().split("T")[0]

document.getElementById("fecha").value = fechaSeleccionada

// guardar servicio
function guardar(){

let fecha=document.getElementById("fecha").value
let hora=document.getElementById("hora").value
let cliente=document.getElementById("cliente").value
let origen=document.getElementById("origen").value
let destino=document.getElementById("destino").value
let pax=document.getElementById("pax").value
let balance=document.getElementById("balance").value

let key="servicios-"+fecha

let lista=JSON.parse(localStorage.getItem(key) || "[]")

let servicio={
fecha,
hora,
cliente,
origen,
destino,
pax,
balance
}

lista.push(servicio)

localStorage.setItem(key, JSON.stringify(lista))

// 👉 mandar a agenda
let agenda=JSON.parse(localStorage.getItem("agenda-"+fecha) || "[]")

agenda.push(hora+" - "+cliente+" "+origen+" → "+destino)

localStorage.setItem("agenda-"+fecha, JSON.stringify(agenda))

// 👉 mandar a contabilidad
let movimientos=JSON.parse(localStorage.getItem("movimientos")||"[]")

if(balance && Number(balance)>0){
movimientos.push({
fecha,
tipo:"Ingreso",
categoria:"servicios",
sub:"Transfer",
monto:Number(balance),
moneda:"MXN",
nota:cliente+" "+origen+" → "+destino
})
}
