<!DOCTYPE html><html><head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Servicios</title><style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:25px;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
background:#4f7df3;
color:white;
font-size:16px;
}

.panel{
background:#1e293b;
padding:20px;
border-radius:15px;
max-width:420px;
margin:auto;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
padding:8px;
border-bottom:1px solid #334155;
}

td{
cursor:pointer;
}

.borrar{
color:#ff6b6b;
cursor:pointer;
}

</style></head><body><h2>Nuevo servicio</h2><div class="panel"><input type="date" id="fecha"><input type="time" id="hora"><select id="tipo">
<option>TRANSFER</option>
<option>SALIDA</option>
<option>LLEGADA</option>
</select><input placeholder="Origen" id="origen"><input placeholder="Destino" id="destino"><input placeholder="Cliente" id="cliente"><input type="number" placeholder="Pax" id="pax"><input type="number" placeholder="Balance pendiente" id="balance"><select id="estado">
<option>PENDIENTE</option>
<option>EN CURSO</option>
<option>COMPLETADO</option>
<option>FINALIZADO</option>
<option>CANCELADO</option>
<option>NO SHOW</option>
</select><button onclick="guardar()">Guardar servicio</button>

<button onclick="location.href='index.html'">
🏠 Inicio
</button></div><h3>Servicios del día</h3><table id="tabla"><tr>
<th>Hora</th>
<th>Cliente</th>
<th>Ruta</th>
<th>Pax</th>
<th>Estado</th>
<th></th>
</tr></table><script>

let tabla=document.getElementById("tabla")

function guardar(){

let fecha=document.getElementById("fecha").value
let hora=document.getElementById("hora").value
let tipo=document.getElementById("tipo").value
let origen=document.getElementById("origen").value
let destino=document.getElementById("destino").value
let cliente=document.getElementById("cliente").value
let pax=document.getElementById("pax").value
let balance=document.getElementById("balance").value
let estado=document.getElementById("estado").value

let servicio={
fecha,
hora,
tipo,
origen,
destino,
cliente,
pax,
balance,
estado
}

let key="servicios-"+fecha

let lista=JSON.parse(localStorage.getItem(key) || "[]")

lista.push(servicio)

localStorage.setItem(key,JSON.stringify(lista))
// agregar a agenda automáticamente

let agendaKey="agenda-"+fecha

let agenda=JSON.parse(localStorage.getItem(agendaKey))||[]

let texto="Transfer "+cliente+" "+origen+" → "+destino

agenda.push({
hora:hora,
evento:texto
})

localStorage.setItem(agendaKey,JSON.stringify(agenda))
location.reload()

}

function cargar(){

let hoy=new Date().toISOString().split("T")[0]

let lista=JSON.parse(localStorage.getItem("servicios-"+hoy))||[]

lista.forEach((s,index)=>{

tabla.innerHTML+=`
<tr>

<td onclick="editar(${index},'hora')">${s.hora}</td>

<td onclick="editar(${index},'cliente')">${s.cliente}</td>

<td onclick="editar(${index},'ruta')">${s.origen} → ${s.destino}</td>

<td onclick="editar(${index},'pax')">${s.pax}</td>

<td onclick="editar(${index},'estado')">${s.estado}</td>

<td class="borrar" onclick="borrar(${index})">🗑</td>

</tr>
`

})

}

function editar(index,campo){

let hoy=new Date().toISOString().split("T")[0]

let lista=JSON.parse(localStorage.getItem("servicios-"+hoy))

let nuevo=prompt("Nuevo valor:")

if(nuevo){

if(campo==="ruta"){

let partes=nuevo.split(",")

lista[index].origen=partes[0]
lista[index].destino=partes[1]

}else{

lista[index][campo]=nuevo

}

localStorage.setItem("servicios-"+hoy,JSON.stringify(lista))
let movimientos=JSON.parse(localStorage.getItem("movimientos")||"[]")

lista.forEach(s=>{

if(s.balance && Number(s.balance)>0){

movimientos.push({
fecha:s.fecha,
tipo:"Ingreso",
categoria:"servicios",
sub:"Balance servicio",
monto:Number(s.balance),
moneda:"MXN",
nota:s.cliente+" "+s.origen+" → "+s.destino
})

}

})

localStorage.setItem("movimientos",JSON.stringify(movimientos))
// actualizar agenda
actualizarAgenda()

location.reload()

}

}

function borrar(index){

let hoy=new Date().toISOString().split("T")[0]

let lista=JSON.parse(localStorage.getItem("servicios-"+hoy))

lista.splice(index,1)

localStorage.setItem("servicios-"+hoy,JSON.stringify(lista))

// actualizar agenda
actualizarAgenda()

location.reload()

  }

cargar()
function actualizarAgenda(){

let hoy=new Date().toISOString().split("T")[0]

let servicios=JSON.parse(localStorage.getItem("servicios-"+hoy))||[]

let agenda=[]

servicios.forEach(s=>{

agenda.push({
hora:s.hora,
evento:"Transfer "+s.cliente+" "+s.origen+" → "+s.destino
})

})

localStorage.setItem("agenda-"+hoy,JSON.stringify(agenda))

}
  
</script>
</body>
</html>
