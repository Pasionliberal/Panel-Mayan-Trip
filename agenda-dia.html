<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:black;color:#d4af37;text-align:center;font-family:sans-serif}
.panel{background:#111;margin:10px;padding:15px;border-radius:15px}
input,textarea{width:90%;margin:5px;padding:10px;border-radius:10px;border:none}
button{width:90%;padding:10px;margin:5px;background:#d4af37;color:black;border:none;border-radius:10px}
</style>
</head>

<body>

<h2 id="fecha"></h2>

<div class="panel">
<h3>📝 Nota</h3>
<textarea id="nota"></textarea>
<button onclick="guardarNota()">Guardar nota</button>
</div>

<div class="panel">
<h3>✅ Tareas</h3>

<input id="nueva" placeholder="Nueva tarea">
<button onclick="agregar()">Agregar</button>

<div id="lista"></div>
</div>

<button onclick="location.href='agenda.html'">⬅ Volver</button>

<script>

let fechaSeleccionada=localStorage.getItem("fechaSeleccionada")

if(!fechaSeleccionada){
fechaSeleccionada=new Date().toISOString().split("T")[0]
}

document.getElementById("fecha").innerText=fechaSeleccionada

// 🔥 NOTA
document.getElementById("nota").value=
localStorage.getItem("nota-"+fechaSeleccionada)||""

function guardarNota(){
localStorage.setItem("nota-"+fechaSeleccionada,document.getElementById("nota").value)
alert("Guardado")
}

// 🔥 TAREAS
function cargar(){

let lista=JSON.parse(localStorage.getItem("tareas-"+fechaSeleccionada)||"[]")

let cont=document.getElementById("lista")
cont.innerHTML=""

lista.forEach((t,i)=>{

let d=document.createElement("div")

d.innerHTML=`
<p>${t}</p>
<button onclick="borrar(${i})">❌</button>
`

cont.appendChild(d)

})

}

function agregar(){

let t=document.getElementById("nueva").value

if(!t) return

let lista=JSON.parse(localStorage.getItem("tareas-"+fechaSeleccionada)||"[]")

lista.push(t)

localStorage.setItem("tareas-"+fechaSeleccionada,JSON.stringify(lista))

document.getElementById("nueva").value=""

cargar()

}

function borrar(i){

let lista=JSON.parse(localStorage.getItem("tareas-"+fechaSeleccionada)||"[]")

lista.splice(i,1)

localStorage.setItem("tareas-"+fechaSeleccionada,JSON.stringify(lista))

cargar()

}

cargar()

</script>

</body>
</html>
