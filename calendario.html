<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:black;color:#d4af37;text-align:center;font-family:sans-serif}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:10px}
.dia{background:#111;padding:15px;border-radius:10px;cursor:pointer}
</style>
</head>

<body>

<h2 id="mes"></h2>

<div class="grid" id="cal"></div>

<script>

let fecha=new Date()
let mes=fecha.getMonth()
let anio=fecha.getFullYear()

let nombresMes=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"]

document.getElementById("mes").innerText=nombresMes[mes]+" "+anio

let dias=new Date(anio,mes+1,0).getDate()

let cont=document.getElementById("cal")

for(let i=1;i<=dias;i++){

let d=document.createElement("div")
d.className="dia"
d.innerText=i

d.onclick=function(){

let fechaSel=anio+"-"+String(mes+1).padStart(2,"0")+"-"+String(i).padStart(2,"0")

localStorage.setItem("fechaSeleccionada",fechaSel)

location.href="agenda-dia.html"

}

cont.appendChild(d)

}

</script>

</body>
</html>
