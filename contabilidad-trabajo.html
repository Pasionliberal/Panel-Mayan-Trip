<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contabilidad Trabajo</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

input,select{
width:90%;
max-width:400px;
padding:10px;
margin:6px;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
}

table{
width:100%;
max-width:800px;
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border-bottom:1px solid #334155;
padding:8px;
}

</style>

</head>


<body>

<h2>Contabilidad Trabajo</h2>

<button onclick="location.href='https://pasionliberal.github.io/Panel-Mayan-Trip/'">
🏠 Inicio
</button>

<h3>Nueva orden</h3>

<input id="fecha" type="date">

<input id="hora" type="time">

<select id="tipo">
<option>SALIDA</option>
<option>LLEGADA</option>
</select>

<input id="origen" placeholder="Origen">

<input id="cliente" placeholder="Nombre">

<input id="pax" type="number" placeholder="Pax">

<input id="destino" placeholder="Destino">

<input id="balance" type="number" placeholder="Balance pendiente">

<br>

<button onclick="guardarServicio()">Guardar servicio</button>

<h3>Servicios del día</h3>

<table id="tabla">

<tr>
<th>Hora</th>
<th>Tipo</th>
<th>Origen</th>
<th>Cliente</th>
<th>Pax</th>
<th>Destino</th>
<th>Balance</th>
</tr>

</table>

<h3 id="totales"></h3>

<script>

let tabla=document.getElementById("tabla")
let totales=document.getElementById("totales")

function keyHoy(){

let hoy=new Date()

let y=hoy.getFullYear()
let m=String(hoy.getMonth()+1).padStart(2,'0')
let d=String(hoy.getDate()).padStart(2,'0')

return y+"-"+m+"-"+d

}

function guardarServicio(){

let servicio={

fecha:document.getElementById("fecha").value,
hora:document.getElementById("hora").value,
tipo:document.getElementById("tipo").value,
origen:document.getElementById("origen").value,
cliente:document.getElementById("cliente").value,
pax:Number(document.getElementById("pax").value),
destino:document.getElementById("destino").value,
balance:Number(document.getElementById("balance").value)

}

let key="servicios-"+servicio.fecha

let lista=JSON.parse(localStorage.getItem(key)||"[]")

lista.push(servicio)

localStorage.setItem(key,JSON.stringify(lista))

cargar(servicio.fecha)

}

function cargar(fecha){

tabla.innerHTML=`
<tr>
<th>Hora</th>
<th>Tipo</th>
<th>Origen</th>
<th>Cliente</th>
<th>Pax</th>
<th>Destino</th>
<th>Balance</th>
</tr>
`

let key="servicios-"+fecha

let lista=JSON.parse(localStorage.getItem(key)||"[]")

let totalPax=0
let totalBalance=0

lista.forEach(s=>{

tabla.innerHTML+=`
<tr>
<td>${s.hora}</td>
<td>${s.tipo}</td>
<td>${s.origen}</td>
<td>${s.cliente}</td>
<td>${s.pax}</td>
<td>${s.destino}</td>
<td>$${s.balance}</td>
</tr>
`

totalPax+=s.pax
totalBalance+=s.balance

})

totales.innerHTML=`
Servicios: ${lista.length} |
Total Pax: ${totalPax} |
Balance pendiente: $${totalBalance}
`

}

let hoy=keyHoy()

document.getElementById("fecha").value=hoy

cargar(hoy)

</script>

</body>

</html>
