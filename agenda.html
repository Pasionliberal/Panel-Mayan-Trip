<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agenda</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}

table{
  width:100%;
  max-width:500px;
  margin:auto;
  border-collapse:collapse;
}

td{
  padding:8px;
  border-bottom:1px solid #334155;
}

input{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:none;
}

textarea{
  width:100%;
  max-width:500px;
  height:120px;
  border-radius:8px;
  padding:10px;
  margin-top:10px;
}

button{
  margin-top:20px;
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  font-size:16px;
}

a{
  color:#a78bfa;
  display:block;
  margin-top:20px;
}

.tarea{
  max-width:500px;
  margin:10px auto;
  text-align:left;
}

.tarea input[type="text"]{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:none;
  margin-top:5px;
}
</style>
</head>

<body>

<h2>Agenda del día</h2>

<table id="agenda"></table>

<button onclick="guardarTodo()">Guardar día</button>

<h3>Notas del día</h3>
<textarea id="notas" placeholder="Escribe notas del día..."></textarea>

<h3>Tareas del día</h3>
<div id="tareas"></div>

<button onclick="agregarTarea()">+ Nueva tarea</button>

<a href="agenda-mes.html">Vista mensual</a>
<a href="index.html">← Volver</a>

<script>

let agenda=document.getElementById("agenda")
let notas=document.getElementById("notas")
let tareas=document.getElementById("tareas")

/* Crear agenda por horas */

for(let h=6;h<=23;h++){

let hora=(h<10?"0"+h:h)+":00"

agenda.innerHTML+=`
<tr>
<td style="width:80px">${hora}</td>
<td><input placeholder="evento..."></td>
</tr>
`

let hora2=(h<10?"0"+h:h)+":30"

agenda.innerHTML+=`
<tr>
<td>${hora2}</td>
<td><input placeholder="evento..."></td>
</tr>
`
}

/* Agregar tarea */

function agregarTarea(){

let div=document.createElement("div")
div.className="tarea"

div.innerHTML=`
<label><input type="checkbox"> Tarea</label>
<input type="text" placeholder="Escribe tarea...">
`

tareas.appendChild(div)

}

/* Guardar todo */

function guardarTodo(){

let hoy=new Date().toISOString().split("T")[0]

/* agenda */

let eventos=[]
document.querySelectorAll("#agenda input").forEach(i=>{
eventos.push(i.value)
})

localStorage.setItem("agenda-"+hoy,JSON.stringify(eventos))

/* notas */

localStorage.setItem("notas-"+hoy,notas.value)

/* tareas */

let listaTareas=[]

document.querySelectorAll(".tarea").forEach(t=>{

let check=t.querySelector("input[type=checkbox]").checked
let texto=t.querySelector("input[type=text]").value

listaTareas.push({check,texto})

})

localStorage.setItem("tareas-"+hoy,JSON.stringify(listaTareas))

alert("Guardado")

}

/* cargar datos */

function cargarTodo(){

let hoy=new Date().toISOString().split("T")[0]

/* agenda */

let eventos=localStorage.getItem("agenda-"+hoy)

if(eventos){

eventos=JSON.parse(eventos)

document.querySelectorAll("#agenda input").forEach((i,index)=>{
if(eventos[index]) i.value=eventos[index]
})

}

/* notas */

let n=localStorage.getItem("notas-"+hoy)
if(n) notas.value=n

/* tareas */

let listaTareas=localStorage.getItem("tareas-"+hoy)

if(listaTareas){

listaTareas=JSON.parse(listaTareas)

listaTareas.forEach(t=>{

let div=document.createElement("div")
div.className="tarea"

div.innerHTML=`
<label><input type="checkbox" ${t.check?"checked":""}> Tarea</label>
<input type="text" value="${t.texto}">
`

tareas.appendChild(div)

})

}

}

cargarTodo()

</script>

</body>
</html>
