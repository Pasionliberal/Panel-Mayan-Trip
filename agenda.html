<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agenda</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;text-align:center;padding:20px}
table{width:100%;max-width:520px;margin:auto;border-collapse:collapse}
td{padding:8px;border-bottom:1px solid #334155}
input{width:100%;padding:8px;border-radius:6px;border:none}
textarea{width:100%;max-width:520px;height:120px;border-radius:8px;padding:10px;margin-top:10px}
button{margin-top:16px;padding:12px 20px;border:none;border-radius:8px;background:#3b82f6;color:#fff;font-size:16px}
a{color:#a78bfa;display:block;margin-top:18px}
.tarea{max-width:520px;margin:10px auto;text-align:left}
.tarea input[type="text"]{width:100%;padding:10px;border-radius:6px;border:none;margin-top:6px}
</style>
</head>
<body>

<h2>Agenda del día</h2>

<table id="agenda"></table>

<button id="guardarBtn">Guardar día</button>

<h3>Notas del día</h3>
<textarea id="notas" placeholder="Escribe notas del día..."></textarea>

<h3>Tareas del día</h3>
<div id="tareas"></div>

<button id="btnNuevaTarea">+ Nueva tarea</button>

<a href="agenda-mes.html">Vista mensual</a>
<a href="index.html">← Volver</a>

<script>
const agenda=document.getElementById("agenda")
const notas=document.getElementById("notas")
const tareas=document.getElementById("tareas")
const btnGuardar=document.getElementById("guardarBtn")
const btnNuevaTarea=document.getElementById("btnNuevaTarea")

const keyHoy=()=>{
  const hoy=new Date()
  const y=hoy.getFullYear()
  const m=String(hoy.getMonth()+1).padStart(2,'0')
  const d=String(hoy.getDate()).padStart(2,'0')
  return y+"-"+m+"-"+d
}

/* crear agenda */

for(let h=6;h<=23;h++){
  const h0=String(h).padStart(2,'0')
  agenda.innerHTML+=`
  <tr>
    <td style="width:80px">${h0}:00</td>
    <td><input placeholder="evento..."></td>
  </tr>`
  agenda.innerHTML+=`
  <tr>
    <td>${h0}:30</td>
    <td><input placeholder="evento..."></td>
  </tr>`
}

/* nueva tarea */

btnNuevaTarea.onclick=()=>{
  const div=document.createElement("div")
  div.className="tarea"
  div.innerHTML=`
  <label><input type="checkbox"> Tarea</label>
  <input type="text" placeholder="Escribe tarea...">
  `
  tareas.appendChild(div)
}

/* guardar */

btnGuardar.onclick=()=>{
  const hoy=keyHoy()

  const eventos=[]
  document.querySelectorAll("#agenda input").forEach(i=>{
    eventos.push(i.value)
  })
  localStorage.setItem("agenda-"+hoy,JSON.stringify(eventos))

  localStorage.setItem("notas-"+hoy,notas.value)

  const lista=[]
  document.querySelectorAll(".tarea").forEach(t=>{
    const check=t.querySelector("input[type=checkbox]").checked
    const texto=t.querySelector("input[type=text]").value
    lista.push({check,texto})
  })
  localStorage.setItem("tareas-"+hoy,JSON.stringify(lista))

  alert("Guardado")
}

/* cargar */

function cargar(){
  const hoy=keyHoy()

  const eventos=JSON.parse(localStorage.getItem("agenda-"+hoy)||"[]")
  document.querySelectorAll("#agenda input").forEach((i,idx)=>{
    if(eventos[idx]) i.value=eventos[idx]
  })

  const n=localStorage.getItem("notas-"+hoy)
  if(n) notas.value=n

  const lista=JSON.parse(localStorage.getItem("tareas-"+hoy)||"[]")
  lista.forEach(t=>{
    const div=document.createElement("div")
    div.className="tarea"
    div.innerHTML=`
    <label><input type="checkbox" ${t.check?"checked":""}> Tarea</label>
    <input type="text" value="${t.texto}">
    `
    tareas.appendChild(div)
  })
}

cargar()
</script>

</body>
</html>
