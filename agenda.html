<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Agenda</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

table{
width:100%;
max-width:500px;
margin:auto;
border-collapse:collapse;
}

td{
padding:8px;
border-bottom:1px solid #334155;
}

input{
width:100%;
padding:8px;
border-radius:6px;
border:none;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-size:16px;
}

a{
color:#a78bfa;
display:block;
margin-top:20px;
}

</style>
</head>


<body>

<h2>Agenda del día</h2>

<table id="agenda"></table>

<button onclick="guardarAgenda()">Guardar día</button>

<a href="agenda-mes.html">Vista mensual</a>
<a href="index.html">← Volver</a>


<script>

let agenda = document.getElementById("agenda")

for(let h=6; h<=23; h++){

let hora = (h<10?"0"+h:h)+":00"

let fila = `
<tr>
<td style="width:80px">${hora}</td>
<td><input placeholder="evento..."></td>
</tr>
`

agenda.innerHTML += fila

let hora2 = (h<10?"0"+h:h)+":30"

fila = `
<tr>
<td>${hora2}</td>
<td><input placeholder="evento..."></td>
</tr>
`

agenda.innerHTML += fila

}



function guardarAgenda(){

let inputs = document.querySelectorAll("#agenda input")

let datos = []

inputs.forEach(i=>{
datos.push(i.value)
})

let hoy = new Date().toISOString().split("T")[0]

localStorage.setItem("agenda-"+hoy, JSON.stringify(datos))

alert("Agenda guardada")

}



function cargarAgenda(){

let hoy = new Date().toISOString().split("T")[0]

let datos = localStorage.getItem("agenda-"+hoy)

if(!datos) return

datos = JSON.parse(datos)

let inputs = document.querySelectorAll("#agenda input")

inputs.forEach((i,index)=>{
if(datos[index]) i.value = datos[index]
})

}

cargarAgenda()

</script>

</body>
</html>
