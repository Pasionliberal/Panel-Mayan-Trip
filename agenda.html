<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agenda</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

table{
width:100%;
max-width:520px;
margin:auto;
border-collapse:collapse;
}

td{
padding:8px;
border-bottom:1px solid #334155;
}

input{
padding:8px;
border-radius:6px;
border:none;
}

textarea{
width:100%;
max-width:520px;
height:120px;
border-radius:8px;
padding:10px;
margin-top:10px;
}

button{
margin-top:16px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-size:16px;
}

.tarea{
display:flex;
align-items:center;
gap:10px;
max-width:520px;
margin:10px auto;
padding:8px;
border-radius:8px;
}

.tarea input[type="checkbox"]{
width:20px;
height:20px;
}

.tarea input[type="text"]{
flex:1;
padding:10px;
border-radius:6px;
border:none;
}

.tarea.completa{
background:#166534;
}

</style>
</head>

<body>

<h2>Agenda</h2>

<div id="fecha"></div>

<table id="agenda"></table>

<button id="guardarBtn">Guardar día</button>

<h3>Notas del día</h3>
<textarea id="notas"></textarea>

<h3>Tareas</h3>

<div id="tareas"></div>

<button id="btnNuevaTarea">+ Nueva tarea</button>

<br><br>

<button onclick="location.href='agenda-mes.html'">📅 Calendario</button>
<button onclick="location.href='https://pasionliberal.github.io/Panel-Mayan-Trip/'">🏠 Inicio</button>

<script>

const agenda=document.getElementById("agenda")
const notas=document.getElementById("notas")
const tareas=document.getElementById("tareas")
const fechaTexto=document.getElementById("fecha")

const btnGuardar=document.getElementById("guardarBtn")
const btnNuevaTarea=document.getElementById("btnNuevaTarea")

/* leer fecha desde URL */

const params=new URLSearchParams(window.location.search)

let fechaActual=params.get("fecha")

if(!fechaActual){

let hoy=new Date()
fechaActual=hoy.toISOString().split("T")[0]

}

/* mostrar fecha */

let fechaObj=new Date(fechaActual)

fechaTexto.innerHTML=fechaObj.toLocaleDateString("es-MX",{
weekday:"long",
year:"numeric",
month:"long",
day:"numeric"
})

/* crear agenda */

for(let h=6;h<=23;h++){

let h0=String(h).padStart(2,'0')

agenda.innerHTML+=`
<tr>
<td style="width:80px">${h0}:00</td>
<td><input style="width:100%"></td>
</tr>
`

agenda.innerHTML+=`
<tr>
<td>${h0}:30</td>
<td><input style="width:100%"></td>
</tr>
`

}

/* nueva tarea */

btnNuevaTarea.onclick=()=>{

let div=document.createElement("div")
div.className="tarea"

div.innerHTML=`
<input type="checkbox">
<input type="text">
`

let check=div.querySelector("input[type=checkbox]")

check.addEventListener("change",()=>{

if(check.checked){
div.classList.add("completa")
}else{
div.classList.remove("completa")
}

})

tareas.appendChild(div)

}

/* guardar */

btnGuardar.onclick=()=>{

let key=fechaActual

let eventos=[]

document.querySelectorAll("#agenda input").forEach(i=>{
eventos.push(i.value)
})

localStorage.setItem("agenda-"+key,JSON.stringify(eventos))
localStorage.setItem("notas-"+key,notas.value)

let lista=[]

document.querySelectorAll(".tarea").forEach(t=>{

let check=t.querySelector("input[type=checkbox]").checked
let texto=t.querySelector("input[type=text]").value

lista.push({check,texto})

})

localStorage.setItem("tareas-"+key,JSON.stringify(lista))

alert("Guardado")

}

/* cargar */

function cargar(){

let key=fechaActual

let eventos=JSON.parse(localStorage.getItem("agenda-"+key)||"[]")

document.querySelectorAll("#agenda input").forEach((i,idx)=>{
if(eventos[idx]) i.value=eventos[idx]
})

let n=localStorage.getItem("notas-"+key)

if(n) notas.value=n

let lista=JSON.parse(localStorage.getItem("tareas-"+key)||
