<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda</title>

<style>
body{
font-family:sans-serif;
background:#0f172a;
color:white;
padding:20px;
text-align:center;
}

.panel{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-bottom:20px;
}

button{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

.dia{
display:inline-block;
width:14%;
padding:10px;
margin:2px;
background:#334155;
border-radius:8px;
cursor:pointer;
}

.activo{
background:#3b82f6;
}

</style>
</head>

<body>

<button onclick="location.href='index.html'">🏠 Inicio</button>

<h2 id="mes"></h2>

<div id="calendario"></div>

<div class="panel">

<h3 id="fechaSeleccionadaTexto"></h3>

<input id="nuevaTarea" placeholder="Nueva tarea">

<button onclick="guardarTarea()">Agregar</button>

<div id="lista"></div>

</div>

<script>

let hoy=new Date()
let año=hoy.getFullYear()
let mes=hoy.getMonth()

let fechaSeleccionada=localStorage.getItem("fechaSeleccionada") || hoy.toISOString().split("T")[0]

// mostrar mes
document.getElementById("mes").innerText=hoy.toLocaleString("es-MX",{month:"long",year:"numeric"})

// generar calendario
let dias=new Date(año, mes+1, 0).getDate()

let contenedor=document.getElementById("calendario")

for(let i=1;i<=dias;i++){

let fecha=`${año}-${String(mes+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`

let div=document.createElement("div")
div.className="dia"
div.innerText=i

if(fecha===fechaSeleccionada){
div.classList.add("activo")
}

div.onclick=function(){
localStorage.setItem("fechaSeleccionada",fecha)
location.reload()
}

contenedor.appendChild(div)

}

// mostrar fecha seleccionada
document.getElementById("fechaSeleccionadaTexto").innerText=fechaSeleccionada

// cargar tareas
function cargar(){

let lista=JSON.parse(localStorage.getItem("agenda-"+fechaSeleccionada) || "[]")

let cont=document.getElementById("lista")

cont.innerHTML=""

lista.forEach((t,i)=>{

let div=document.createElement("div")

div.innerHTML=`
${t}
<button onclick="borrar(${i})">❌</button>
`

cont.appendChild(div)

})

}

// guardar tarea
function guardarTarea(){

let tarea=document.getElementById("nuevaTarea").value

if(!tarea) return

let lista=JSON.parse(localStorage.getItem("agenda-"+fechaSeleccionada) || "[]")

lista.push(tarea)

localStorage.setItem("agenda-"+fechaSeleccionada,JSON.stringify(lista))

location.reload()

}

// borrar
function borrar(i){

let lista=JSON.parse(localStorage.getItem("agenda-"+fechaSeleccionada))

lista.splice(i,1)

localStorage.setItem("agenda-"+fechaSeleccionada,JSON.stringify(lista))

location.reload()

}

cargar()

</script>

</body>
</html>
