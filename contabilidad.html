<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contabilidad</title><style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:25px;
}

.panel{
background:#1e293b;
padding:20px;
border-radius:15px;
max-width:420px;
margin:auto;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#4f7df3;
color:white;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
padding:8px;
border-bottom:1px solid #334155;
}

.icon{
cursor:pointer;
margin:0 6px;
}
</style></head><body><h2>Contabilidad</h2><button onclick="location.href='index.html'">🏠 Inicio</button>

<div class="panel"><h3>Conversor USD → MXN</h3><input id="usd" placeholder="USD">
<input id="mxn" placeholder="MXN"><div id="tc"></div></div><div class="panel"><h3>Nuevo movimiento</h3><input type="date" id="fecha"><select id="tipo">
<option>Ingreso</option>
<option>Gasto</option>
</select><select id="categoria" onchange="cargarSub()">
<option value="">Categoría</option>
<option value="trabajo">Trabajo</option>
<option value="servicios">Servicios</option>
<option value="personal">Personal</option>
<option value="vehiculo">Vehículo</option>
</select><select id="sub">
<option value="">Subcategoría</option>
</select><input placeholder="Monto" id="monto"><select id="moneda">
<option>MXN</option>
<option>USD</option>
</select><input placeholder="Nota" id="nota"><button onclick="guardar()">Guardar movimiento</button>

</div><h3>Movimientos</h3><table id="tabla">
<tr>
<th>Fecha</th>
<th>Tipo</th>
<th>Categoría</th>
<th>Monto</th>
<th></th>
</tr>
</table><h3 id="balance"></h3><script>

let tipoCambio = Number(localStorage.getItem("tipoCambio")) || 18

document.getElementById("tc").innerHTML="Tipo cambio: "+tipoCambio.toFixed(2)

document.getElementById("usd").addEventListener("input",function(){

let usd=parseFloat(this.value)

if(!usd) return

document.getElementById("mxn").value=(usd*tipoCambio).toFixed(2)

})

function cargarSub(){

let c=document.getElementById("categoria").value
let sub=document.getElementById("sub")

sub.innerHTML=""

if(c==="trabajo"){
sub.innerHTML+=`<option>Sueldo</option>`
sub.innerHTML+=`<option>Salario</option>`
sub.innerHTML+=`<option>Extras 1</option>`
sub.innerHTML+=`<option>Extras 2</option>`
sub.innerHTML+=`<option>Tips MXN</option>`
sub.innerHTML+=`<option>Tips USD</option>`
}

if(c==="servicios"){
sub.innerHTML+=`<option>Transfer</option>`
sub.innerHTML+=`<option>Extras servicio</option>`
sub.innerHTML+=`<option>Balance servicio</option>`
}

if(c==="personal"){
sub.innerHTML+=`<option>Comida</option>`
sub.innerHTML+=`<option>Casa</option>`
sub.innerHTML+=`<option>Servicios</option>`
sub.innerHTML+=`<option>Salud</option>`
sub.innerHTML+=`<option>Ocio</option>`
sub.innerHTML+=`<option>Otros</option>`
}

if(c==="vehiculo"){
sub.innerHTML+=`<option>Gasolina</option>`
sub.innerHTML+=`<option>Mantenimiento</option>`
sub.innerHTML+=`<option>Llantas</option>`
sub.innerHTML+=`<option>Seguro</option>`
sub.innerHTML+=`<option>Multas</option>`
sub.innerHTML+=`<option>Otros</option>`
}

}

function guardar(){

let mov={
fecha:document.getElementById("fecha").value,
tipo:document.getElementById("tipo").value,
categoria:document.getElementById("categoria").value,
sub:document.getElementById("sub").value,
monto:Number(document.getElementById("monto").value),
moneda:document.getElementById("moneda").value,
nota:document.getElementById("nota").value
}

if(mov.moneda==="USD"){
mov.monto=mov.monto*tipoCambio
}

let lista=JSON.parse(localStorage.getItem("contabilidad"))||[]

lista.push(mov)

localStorage.setItem("contabilidad",JSON.stringify(lista))

location.reload()

}

function borrar(i){

let lista=JSON.parse(localStorage.getItem("contabilidad"))

lista.splice(i,1)

localStorage.setItem("contabilidad",JSON.stringify(lista))

location.reload()

}

function editar(i){

let lista=JSON.parse(localStorage.getItem("contabilidad"))

let nuevo=prompt("Nuevo monto:",lista[i].monto)

if(nuevo){

lista[i].monto=Number(nuevo)

localStorage.setItem("contabilidad",JSON.stringify(lista))

location.reload()

}

}

function cargar(){

let tabla=document.getElementById("tabla")

let lista=JSON.parse(localStorage.getItem("contabilidad"))||[]

let ingresos=0
let gastos=0

lista.forEach((m,i)=>{

tabla.innerHTML+=`
<tr>
<td>${m.fecha}</td>
<td>${m.tipo}</td>
<td>${m.sub}</td>
<td>$${m.monto.toFixed(2)}</td>
<td>
<span class="icon" onclick="editar(${i})">✏</span>
<span class="icon" onclick="borrar(${i})">🗑</span>
</td>
</tr>
`

if(m.tipo==="Ingreso"){
ingresos+=m.monto
}else{
gastos+=m.monto
}

})

let balance=ingresos-gastos

document.getElementById("balance").innerHTML=
"Ingresos: $"+ingresos.toFixed(2)+
" | Gastos: $"+gastos.toFixed(2)+
" | Balance: $"+balance.toFixed(2)

}

cargar()

</script></body>
</html>
