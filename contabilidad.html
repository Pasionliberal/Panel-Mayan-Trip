<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contabilidad</title>

<style>
body{
font-family:sans-serif;
background:#0f172a;
color:#fff;
padding:20px;
}

h2{
text-align:center;
margin-bottom:10px;
}

.panel{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
background:#3b82f6;
color:white;
font-weight:bold;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #334155;
text-align:center;
}

.icon{
cursor:pointer;
}
</style>

</head>
<body>

<button onclick="location.href='index.html'">🏠 Inicio</button>

<h2>Contabilidad</h2>

<div class="panel">
<h3>Conversor USD → MXN</h3>
<input id="usd" placeholder="USD" oninput="convertir()">
<input id="mxn" placeholder="MXN" readonly>
</div>

<div class="panel">
<h3>Nuevo movimiento</h3>

<input type="date" id="fecha">

<select id="tipo">
<option>Ingreso</option>
<option>Gasto</option>
</select>

<select id="categoria" onchange="cargarSub()">
<option value="">Categoría</option>
<option value="trabajo">Trabajo</option>
<option value="servicios">Servicios</option>
<option value="personal">Personal</option>
<option value="vehiculo">Vehículo</option>
<option value="finanzas">Finanzas</option>
</select>

<select id="sub">
<option value="">Subcategoría</option>
</select>

<input id="monto" placeholder="Monto">

<select id="moneda">
<option>MXN</option>
<option>USD</option>
</select>

<input id="nota" placeholder="Nota">

<button onclick="guardar()">Guardar movimiento</button>
</div>

<div class="panel">
<h3>Movimientos</h3>
<table id="tabla"></table>
<h3 id="balance"></h3>
</div>

<script>

let tipoCambio=0

async function cargarTipoCambio(){
let r=await fetch("https://api.exchangerate.host/latest?base=USD&symbols=MXN")
let d=await r.json()
tipoCambio=d.rates.MXN
}

function convertir(){
let usd=document.getElementById("usd").value
document.getElementById("mxn").value=(usd*tipoCambio).toFixed(2)
}

// subcategorías
function cargarSub(){

let c=document.getElementById("categoria").value
let sub=document.getElementById("sub")

sub.innerHTML="<option>Subcategoría</option>"

if(c==="trabajo"){
sub.innerHTML+=`<option>Sueldo</option>
<option>Salario</option>
<option>Extras 1</option>
<option>Extras 2</option>
<option>Tips MXN</option>
<option>Tips USD</option>`
}

if(c==="servicios"){
sub.innerHTML+=`<option>Transfer</option>
<option>Balance servicio</option>`
}

if(c==="personal"){
sub.innerHTML+=`<option>Comida</option>
<option>Renta</option>
<option>Luz</option>
<option>Internet</option>
<option>Ocio</option>`
}

if(c==="vehiculo"){
sub.innerHTML+=`<option>Gasolina</option>
<option>Mantenimiento</option>
<option>Casetas</option>`
}

if(c==="finanzas"){
sub.innerHTML+=`<option>Ahorro</option>
<option>Inversión</option>`
}

}

// guardar
function guardar(){

let fecha=document.getElementById("fecha").value
let tipo=document.getElementById("tipo").value
let categoria=document.getElementById("categoria").value
let sub=document.getElementById("sub").value
let monto=Number(document.getElementById("monto").value)
let moneda=document.getElementById("moneda").value
let nota=document.getElementById("nota").value

if(!monto) return alert("mete monto")

if(moneda==="USD"){
monto=monto*tipoCambio
moneda="MXN"
}

let lista=JSON.parse(localStorage.getItem("movimientos")||"[]")

lista.push({
fecha,
tipo,
categoria,
sub,
monto,
moneda,
nota
})

localStorage.setItem("movimientos",JSON.stringify(lista))

location.reload()
}

// cargar tabla
function cargarMovimientos(){

let tabla=document.getElementById("tabla")

tabla.innerHTML=`
<tr>
<th>Fecha</th>
<th>Tipo</th>
<th>Categoría</th>
<th>Monto</th>
<th></th>
</tr>
`

let lista=JSON.parse(localStorage.getItem("movimientos")||"[]")

let total=0

lista.forEach((m,i)=>{

if(m.tipo==="Ingreso") total+=Number(m.monto)
if(m.tipo==="Gasto") total-=Number(m.monto)

let fila=`
<tr>
<td>${m.fecha}</td>
<td>${m.tipo}</td>
<td>${m.categoria} - ${m.sub}</td>
<td>${m.monto.toFixed(2)} MXN</td>
<td><button onclick="borrar(${i})">❌</button></td>
</tr>
`

tabla.innerHTML+=fila

})

document.getElementById("balance").innerHTML="Balance: $"+total.toFixed(2)

}

// borrar
function borrar(i){

let lista=JSON.parse(localStorage.getItem("movimientos")||"[]")

lista.splice(i,1)

localStorage.setItem("movimientos",JSON.stringify(lista))

location.reload()

}

cargarTipoCambio()
cargarMovimientos()

</script>

</body>
</html>
